<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo dữ liệu Gacha</title>
  <link rel="icon" href="https://github.com/Panbap/anh/blob/main/icon1.png?raw=true" type="image/png">
  <link
    href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet">
  <style>
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      font-weight: 600;
      background-color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-size: 24px;
      color: #555;
      flex-direction: column;
    }

    .spinner {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #ff7094;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1.2s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading-text::after {
      content: '';
      display: inline-block;
      animation: dots 1.5s steps(3, end) infinite;
    }

    @keyframes dots {

      0%,
      20% {
        content: '';
      }

      40% {
        content: '.';
      }

      60% {
        content: '..';
      }

      80%,
      100% {
        content: '...';
      }
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <div class="spinner"></div>
    <div id="loading-text">Loading</div>
  </div>
  <div class="container">
    <h2>Tạo link Gacha </h2>

    <form id="dataForm">
      <div id="textsContainer">
        <!-- Ô text mẫu đầu tiên -->
        <div class="input-group">
          <label>Text 1: <input type="text" name="text" value="Xin chào!"></label>
          <button type="button" class="remove-btn" onclick="this.parentElement.remove()">❌</button>
        </div>
        <div class="input-group">
          <label>Text 2: <input type="text" name="text" value="Yêu thương"></label>
          <button type="button" class="remove-btn" onclick="this.parentElement.remove()">❌</button>
        </div>
      </div>
      <div class="button-group">
        <button type="button" id="addTextBtn">+ Thêm text</button>
        <button type="submit">Tạo link đầy đủ</button>
      </div>

    </form>

    <p><b>Link kết quả:</b></p>
    <div class="link-output">
      <button type="button" id="copyBtn" class="copy-btn">Copy</button>
      <input type="text" id="outputLink" readonly />
    </div>
  </div>
